<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymTrack - Iniciar sesión</title>
    <link rel="stylesheet" href="../app.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-panel" aria-labelledby="login-title">
            <a class="login-brand" href="../dashboard/dashboard.html">GymTrack</a>
            <p class="login-kicker">ELITE PERFORMANCE</p>
            <h1 id="login-title">Bienvenido de nuevo</h1>
            <p class="login-intro">Ingresa para continuar con tus entrenamientos.</p>
            <form id="auth-form" novalidate>
                <label for="email">Correo electrónico</label>
                <input id="email" name="email" type="email" autocomplete="email" placeholder="tu@correo.com" required>
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Tu contraseña" required>
                <p id="auth-message" class="auth-message" role="alert" aria-live="polite"></p>
                <button id="submit-auth" class="auth-submit" type="submit">
                    <span class="material-symbols-outlined" aria-hidden="true">login</span>
                    <span>Iniciar sesión</span>
                </button>
            </form>
            <p class="auth-switch">¿Aún no tienes cuenta? <button id="toggle-mode" type="button">Regístrate</button></p>
        </section>
    </main>
    <script type="module" src="login.js"></script>
</body>
</html>
